---
# AAP example: uses `run_job_template`, supported by the AAP EDA controller.
# Each referenced job template must exist in the Automation Controller with
# "Prompt on launch" enabled for Variables so the `extra_vars` below are accepted.
# (Set `include_events: false` only if you do NOT want the full matching event
# injected alongside them.)
# This rulebook uses the kafka source, which is not affected by event-stream
# source swapping, so the normalized `event.edwin_ai.*` fields are always present.
# For local `ansible-rulebook` CLI runs, see the variant in the parent directory.
- name: Edwin AI Kafka Event Stream
  hosts: all
  sources:
    - logicmonitor.edwin_ai.kafka:
        topic: edwin-ai-alerts
        bootstrap_servers: "{{ KAFKA_BOOTSTRAP_SERVERS | default('localhost:9092') }}"
        group_id: eda-edwin-ai
        security_protocol: "{{ KAFKA_SECURITY_PROTOCOL | default('PLAINTEXT') }}"

  rules:
    - name: Critical alert - auto-remediate
      condition: >-
        event.edwin_ai.severity == "critical" and
        event.edwin_ai.status == "active"
      action:
        run_job_template:
          name: Edwin AI - Remediate Critical
          organization: Default
          job_args:
            extra_vars:
              target_host: "{{ event.edwin_ai.host }}"
              alert_id: "{{ event.edwin_ai.alert_id }}"
              severity: "{{ event.edwin_ai.severity }}"

    - name: Error alert - escalate
      condition: >-
        event.edwin_ai.severity == "error" and
        event.edwin_ai.status == "active"
      action:
        run_job_template:
          name: Edwin AI - Escalate Alert
          organization: Default
          job_args:
            extra_vars:
              target_host: "{{ event.edwin_ai.host }}"
              alert_id: "{{ event.edwin_ai.alert_id }}"
              message: "{{ event.edwin_ai.message }}"

    - name: Log all events
      condition: event.edwin_ai is defined
      action:
        print_event:
          pretty: true
